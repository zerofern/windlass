[package]
name = "windlass"
version = "0.1.0"
edition = "2024"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# HTTP clients
reqwest = { version = "0.12", features = ["json", "cookies"] }

# Docker API
bollard = "0.18"

# File watching with debounce (re-exports notify internally)
notify-debouncer-mini = "0.6"

# Validated newtypes
nutype = { version = "0.5", features = ["serde"] }

# Secret handling
secrecy = { version = "0.10", features = ["serde"] }

# Units of measure (disk space)
uom = { version = "0.36", features = ["f64", "si"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
anyhow = "1"
thiserror = "2"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Async stream utilities
futures-util = "0.3"

# Disk space check (statvfs)
libc = "0.2"

[dev-dependencies]
proptest = "1"
wiremock = "0.6"
tempfile = "3"

