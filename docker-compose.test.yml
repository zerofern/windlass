# Integration test stack for Windlass.
#
# Starts Windlass against mock services so the full event loop can be exercised
# without touching production MAM, a real VPN, or real qBittorrent.
#
# ⚠ Uses container_name: gluetun — do NOT run alongside the production stack.
#
# Usage:
#   ./tests/integration/run.sh
#
# Or manually:
#   docker compose -f docker-compose.test.yml up --build
#   docker compose -f docker-compose.test.yml down -v

services:

  # ── Mock Gluetun ─────────────────────────────────────────────────────────────
  # Must be named "gluetun": Windlass inspects this container by name via Docker API.
  mock-gluetun:
    image: alpine:latest
    container_name: gluetun
    command:
      - sh
      - -c
      - |
        mkdir -p /tmp/gluetun
        printf '10.8.0.1' > /tmp/gluetun/ip
        printf '51820'    > /tmp/gluetun/forwarded_port
        sleep infinity
    volumes:
      - vpn-files:/tmp/gluetun
    healthcheck:
      test: ["CMD-SHELL", "grep -q '[0-9]' /tmp/gluetun/forwarded_port"]
      interval: 2s
      timeout: 1s
      retries: 5
      start_period: 3s

  # ── Mock qBittorrent (WireMock) ───────────────────────────────────────────────
  mock-qbittorrent:
    image: wiremock/wiremock:3.5.4-alpine
    ports:
      - "18080:8080"
    volumes:
      - ./tests/integration/stubs/qbittorrent/mappings:/home/wiremock/mappings:ro
    command: ["--port", "8080", "--verbose"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/__admin/health | grep -q healthy"]
      interval: 3s
      timeout: 2s
      retries: 10

  # ── Mock Gotify (WireMock) ────────────────────────────────────────────────────
  mock-gotify:
    image: wiremock/wiremock:3.5.4-alpine
    ports:
      - "18081:8080"
    volumes:
      - ./tests/integration/stubs/gotify/mappings:/home/wiremock/mappings:ro
    command: ["--port", "8080"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/__admin/health | grep -q healthy"]
      interval: 3s
      timeout: 2s
      retries: 10

  # ── Mock MAM (WireMock) ───────────────────────────────────────────────────────
  mock-mam:
    image: wiremock/wiremock:3.5.4-alpine
    ports:
      - "18082:8080"
    volumes:
      - ./tests/integration/stubs/mam/mappings:/home/wiremock/mappings:ro
    command: ["--port", "8080"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/__admin/health | grep -q healthy"]
      interval: 3s
      timeout: 2s
      retries: 10

  # ── Windlass (built from source) ──────────────────────────────────────────────
  windlass:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: windlass-test
    depends_on:
      mock-gluetun:
        condition: service_healthy
      mock-qbittorrent:
        condition: service_healthy
      mock-gotify:
        condition: service_healthy
      mock-mam:
        condition: service_healthy
    volumes:
      - vpn-files:/tmp/gluetun:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      QBITTORRENT_URL:  http://mock-qbittorrent:8080
      QBITTORRENT_USER: admin
      QBITTORRENT_PASS: adminadmin
      MAM_SESSION:      test_session
      GOTIFY_URL:       http://mock-gotify:8080
      GOTIFY_TOKEN:     test_token
      # Point MAM calls at the local mock — no VPN proxy needed.
      MAM_SEEDBOX_URL:  http://mock-mam:8080/json/dynamicSeedbox.php
      MAM_LOAD_URL:     http://mock-mam:8080/jsonLoad.php
      # GLUETUN_PROXY_URL intentionally absent → vpn_client makes direct connections.
      DATA_PATH:        /tmp
      DUMP_DIR:         /tmp/windlass_dumps
      VPN_IP_FILE:      /tmp/gluetun/ip
      VPN_PORT_FILE:    /tmp/gluetun/forwarded_port
      RUST_LOG:         windlass=debug,info
    restart: "no"

volumes:
  vpn-files:
