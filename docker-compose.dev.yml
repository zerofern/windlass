# Development and integration test stack for Windlass.
#
# §34 (post-rebuild): runs Windlass against the contract-verification stack
# documented in `docs/operator-readiness.md`:
#
#   - Real qBittorrent (testkit qbit image)
#   - Fake MAM        (windlass-testkit, TESTKIT_MODE=mam)
#   - Fake Gluetun    (windlass-testkit, TESTKIT_MODE=gluetun)
#   - Real Postgres
#   - Windlass        (built from source)
#
# WireMock and the chaos-controller were retired in §34 PR 2.  Per-test
# control surfaces:
#   - Fake MAM    : POST http://localhost:18082/control/...
#   - Fake Gluetun: POST http://localhost:9001/...
#   - qBittorrent : real web API at http://localhost:18080/api/v2/...
#
# ⚠ Uses container_name: gluetun — do NOT run alongside the production stack.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#   docker compose -f docker-compose.dev.yml down -v

services:
  # ── Fake Gluetun (testkit) ───────────────────────────────────────────────────
  mock-gluetun:
    build:
      context: .
      dockerfile: windlass-testkit/Dockerfile
    container_name: gluetun
    ports:
      - "9001:9001"
    environment:
      TESTKIT_MODE: gluetun
      VPN_IP_FILE: /tmp/gluetun/ip
      VPN_PORT_FILE: /tmp/gluetun/forwarded_port
      RUST_LOG: info
    volumes:
      - vpn-files:/tmp/gluetun
    healthcheck:
      test: ["CMD-SHELL", "grep -q '[0-9]' /tmp/gluetun/forwarded_port"]
      interval: 2s
      timeout: 1s
      retries: 5
      start_period: 5s

  # ── Real qBittorrent ─────────────────────────────────────────────────────────
  # Reuses the same image as windlass-clients/tests/qbit-image used by the
  # standalone client-layer suite (docker-compose.qbit-integration.yml).  In
  # this stack Windlass talks to the WebUI directly; no Gluetun netns share.
  qbittorrent:
    build:
      context: ./windlass-clients/tests/qbit-image
    environment:
      PUID: "1000"
      PGID: "1000"
      WEBUI_PORT: "8080"
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v2/app/version || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15

  # ── Fake MAM (testkit TESTKIT_MODE=mam) ──────────────────────────────────────
  mock-mam:
    build:
      context: .
      dockerfile: windlass-testkit/Dockerfile
    ports:
      - "18082:8080"
    environment:
      TESTKIT_MODE: mam
      RUST_LOG: info
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/control/journal >/dev/null || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 10

  # ── Postgres ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: windlass
      POSTGRES_PASSWORD: windlass
      POSTGRES_DB: windlass
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./windlass-db/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U windlass -d windlass"]
      interval: 3s
      timeout: 2s
      retries: 10

  # ── Windlass (built from source) ──────────────────────────────────────────────
  windlass:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: windlass-test
    ports:
      - "5010:5010"
    depends_on:
      mock-gluetun:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy
      mock-mam:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - vpn-files:/tmp/gluetun:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      QBITTORRENT_URL: http://qbittorrent:8080
      QBITTORRENT_USER: admin
      QBITTORRENT_PASS: adminadmin
      MAM_SESSION: test_session
      # All MAM URLs point at the testkit fake; any default that fell
      # back to real MAM would be a test-isolation bug.
      MAM_SEEDBOX_URL: http://mock-mam:8080/json/dynamicSeedbox.php
      MAM_LOAD_URL: "http://mock-mam:8080/jsonLoad.php?snatch_summary=true&clientStats"
      MAM_CHECK_SESSION_URL: http://mock-mam:8080/json/checkCookie.php
      MAM_JSON_IP_URL: http://mock-mam:8080/json/jsonIp.php
      MAM_TORRENT_BASE_URL: http://mock-mam:8080
      DATA_PATH: /tmp
      DUMP_DIR: /tmp/windlass_dumps
      VPN_IP_FILE: /tmp/gluetun/ip
      VPN_PORT_FILE: /tmp/gluetun/forwarded_port
      # Legacy Gluetun mode: the health-poll anchor is the fake
      # Gluetun container.  The vpn-branch changed the default anchor
      # to "windlass" (tunnel mode polls itself); without this
      # override the VPN core inspects a nonexistent container and
      # reports ContainerUnhealthy forever.
      WINDLASS_ANCHOR_CONTAINER: gluetun
      WINDLASS_BIND: 0.0.0.0:5010
      DATABASE_URL: postgres://windlass:windlass@postgres:5432/windlass
      WINDLASS_EXECUTE_SERVICE_ACTIONS: ${WINDLASS_EXECUTE_SERVICE_ACTIONS:-${WINDLASS_EXECUTE_SHADOW_ACTIONS:-true}}
      RUST_LOG: windlass=debug,info
volumes:
  vpn-files:
  postgres-data:
