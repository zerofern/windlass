# Development and integration test stack for Windlass.
#
# §34 (post-rebuild): runs Windlass against the contract-verification stack
# documented in `docs/operator-readiness.md`, over the real owned-tunnel
# control plane:
#
#   - WireGuard fixture  (windlass-testkit/wg-server: real wg peer +
#                         exit-IP reflector + NAT-PMP responder + control)
#   - Real qBittorrent   (own dev-network IP; reached via Docker DNS and
#                         allow-listed through the kill switch)
#   - Fake MAM           (windlass-testkit, TESTKIT_MODE=mam)
#   - Real Postgres
#   - Windlass           (built from source, NET_ADMIN, owns wg0 + kill switch)
#
# Windlass brings up a real `wg0` against the fixture peer and installs
# the nftables kill switch; control-plane dependencies (Postgres, fake
# MAM, qBit WebUI) are allow-listed, everything else must traverse the
# tunnel.  The full in-namespace kill-switch + tunnel-egress behavior is
# covered end-to-end by `just integration-wg`.
#
# Per-test control surfaces:
#   - Fake MAM   : POST http://localhost:18082/control/...
#   - WG fixture : POST http://localhost:19090/control/... (natpmp-port,
#                  exit-ip, reset)
#   - qBittorrent: real web API at http://localhost:18080/api/v2/...
#
# Requires the host kernel's `wireguard` module (mainline since 5.6).
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#   docker compose -f docker-compose.dev.yml down -v

services:
  # ── WireGuard fixture (testkit) ──────────────────────────────────────────────
  # Fresh keys per run; writes the client wg.conf into the shared volume.
  # Its tunnel address 10.2.0.1 serves the exit-IP reflector (:8080) and
  # the NAT-PMP responder (:5351/udp).  The control plane rides on the
  # same HTTP server, reachable from the host via the published port.
  wg-server:
    build:
      context: windlass-testkit/wg-server
    cap_add:
      - NET_ADMIN
    networks:
      dev:
        ipv4_address: 172.28.0.20
    ports:
      - "19090:8080"
    environment:
      WG_INT_ENDPOINT: 172.28.0.20:51820
      # Short leases so port-change contracts propagate within a
      # couple of renewal cycles instead of minutes.
      NATPMP_LIFETIME_SECONDS: "15"
    volumes:
      - wg-shared:/shared
    healthcheck:
      test: ["CMD", "test", "-f", "/shared/wg.conf"]
      interval: 1s
      timeout: 2s
      retries: 60

  # ── Real qBittorrent ─────────────────────────────────────────────────────────
  # On the dev network with its own IP (NOT sharing Windlass's
  # namespace).  The contract suite restarts the windlass container in
  # `reset_stack()` before every test; a `network_mode: container:`
  # attachment would be orphaned by that restart.  Windlass reaches qBit
  # via Docker DNS over a kill-switch allow-listed endpoint
  # (`TUNNEL_FIREWALL_ALLOW_TCP`).  The full in-namespace kill-switch +
  # tunnel-egress behavior is covered end-to-end by the dedicated
  # `just integration-wg` suite; here we exercise the Windlass↔qBit
  # contract over the real tunnel control plane.
  qbittorrent:
    build:
      context: ./windlass-clients/tests/qbit-image
    networks:
      dev:
        ipv4_address: 172.28.0.12
    ports:
      - "18080:8080"
    environment:
      PUID: "1000"
      PGID: "1000"
      WEBUI_PORT: "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v2/app/version || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15

  # ── Fake MAM (testkit TESTKIT_MODE=mam) ──────────────────────────────────────
  mock-mam:
    build:
      context: .
      dockerfile: windlass-testkit/Dockerfile
    networks:
      dev:
        ipv4_address: 172.28.0.11
    ports:
      - "18082:8080"
    environment:
      TESTKIT_MODE: mam
      RUST_LOG: info
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/control/journal >/dev/null || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 10

  # ── Postgres ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    networks:
      dev:
        ipv4_address: 172.28.0.10
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: windlass
      POSTGRES_PASSWORD: windlass
      POSTGRES_DB: windlass
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./windlass-db/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U windlass -d windlass"]
      interval: 3s
      timeout: 2s
      retries: 10

  # ── Windlass (built from source) ──────────────────────────────────────────────
  windlass:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: windlass-test
    cap_add:
      - NET_ADMIN
    networks:
      dev:
        ipv4_address: 172.28.0.2
    ports:
      - "5010:5010"   # dashboard
    depends_on:
      wg-server:
        condition: service_healthy
      mock-mam:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy
    volumes:
      - wg-shared:/wg:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:5010/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s
    environment:
      WG_CONFIG_PATH: /wg/wg.conf
      NATPMP_GATEWAY: 10.2.0.1:5351
      # The kill switch only permits these non-tunnel TCP endpoints
      # (control plane: Postgres + fake MAM + qBit WebUI).  Everything
      # else must go through the tunnel.
      TUNNEL_FIREWALL_ALLOW_TCP: 172.28.0.10:5432,172.28.0.11:8080,172.28.0.12:8080
      TUNNEL_LOCAL_ROUTES: 100.64.0.0/10,192.168.2.0/24
      # In-tunnel exit-IP reflector (the fixture's tunnel address).
      EXIT_IP_URLS: http://10.2.0.1:8080/
      # Short cadences so IP-change contracts are testable; production
      # defaults are 6 h / 61 min.
      EXIT_IP_QUERY_INTERVAL_SECS: "5"
      SEEDBOX_UPDATE_MIN_INTERVAL_SECS: "20"
      WINDLASS_ANCHOR_CONTAINER: windlass-test
      # qBit on the dev network, allow-listed through the kill switch.
      QBITTORRENT_URL: http://qbittorrent:8080
      QBITTORRENT_USER: admin
      QBITTORRENT_PASS: adminadmin
      MAM_SESSION: test_session
      # All MAM URLs point at the testkit fake; any default that fell
      # back to real MAM would be a test-isolation bug.
      MAM_SEEDBOX_URL: http://mock-mam:8080/json/dynamicSeedbox.php
      MAM_LOAD_URL: "http://mock-mam:8080/jsonLoad.php?snatch_summary=true&clientStats"
      MAM_CHECK_SESSION_URL: http://mock-mam:8080/json/checkCookie.php
      MAM_JSON_IP_URL: http://mock-mam:8080/json/jsonIp.php
      MAM_TORRENT_BASE_URL: http://mock-mam:8080
      DATA_PATH: /tmp
      DISK_POLL_INTERVAL_SECS: "5"
      DISK_HARD_FLOOR_BYTES: "1"
      DUMP_DIR: /tmp/windlass_dumps
      WINDLASS_BIND: 0.0.0.0:5010
      DATABASE_URL: postgres://windlass:windlass@postgres:5432/windlass
      RUST_LOG: windlass=debug,info

volumes:
  wg-shared:
  postgres-data:

networks:
  dev:
    ipam:
      config:
        - subnet: 172.28.0.0/24
