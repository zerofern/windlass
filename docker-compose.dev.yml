# Development and integration test stack for Windlass.
#
# Runs Windlass against mock services. Use for:
#   - Viewing the web UI locally without a production VPN stack
#   - Running integration tests: just integration
#   - Manual chaos testing via the chaos controller API
#
# ⚠ Uses container_name: gluetun — do NOT run alongside the production stack.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#   docker compose -f docker-compose.dev.yml down -v

services:

  # ── Gluetun mock ─────────────────────────────────────────────────────────────
  mock-gluetun:
    build:
      context: .
      dockerfile: windlass-testkit/Dockerfile
    container_name: gluetun
    environment:
      TESTKIT_MODE: gluetun
      VPN_IP_FILE: /tmp/gluetun/ip
      VPN_PORT_FILE: /tmp/gluetun/forwarded_port
      RUST_LOG: info
    volumes:
      - vpn-files:/tmp/gluetun
    healthcheck:
      test: ["CMD-SHELL", "grep -q '[0-9]' /tmp/gluetun/forwarded_port"]
      interval: 2s
      timeout: 1s
      retries: 5
      start_period: 5s

  # ── Mock qBittorrent (WireMock) ───────────────────────────────────────────────
  mock-qbittorrent:
    image: wiremock/wiremock:3.5.4-alpine
    ports:
      - "18080:8080"
    command: ["--port", "8080"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/__admin/health | grep -q healthy"]
      interval: 3s
      timeout: 2s
      retries: 10

  # ── Mock Gotify (WireMock) ────────────────────────────────────────────────────
  mock-gotify:
    image: wiremock/wiremock:3.5.4-alpine
    ports:
      - "18081:8080"
    command: ["--port", "8080"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/__admin/health | grep -q healthy"]
      interval: 3s
      timeout: 2s
      retries: 10

  # ── Mock MAM (WireMock) ───────────────────────────────────────────────────────
  mock-mam:
    image: wiremock/wiremock:3.5.4-alpine
    ports:
      - "18082:8080"
    command: ["--port", "8080"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/__admin/health | grep -q healthy"]
      interval: 3s
      timeout: 2s
      retries: 10

  # ── Chaos controller ──────────────────────────────────────────────────────────
  chaos-controller:
    build:
      context: .
      dockerfile: windlass-testkit/Dockerfile
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      TESTKIT_MODE: chaos
      QBIT_ADMIN_URL: http://mock-qbittorrent:8080/__admin
      MAM_ADMIN_URL: http://mock-mam:8080/__admin
      GOTIFY_ADMIN_URL: http://mock-gotify:8080/__admin
      RUST_LOG: info
    depends_on:
      mock-qbittorrent:
        condition: service_healthy
      mock-gotify:
        condition: service_healthy
      mock-mam:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo -e \"GET /health HTTP/1.0\\r\\n\\r\\n\" > /dev/tcp/localhost/9000' 2>/dev/null || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 10

  # ── Windlass (built from source) ──────────────────────────────────────────────
  windlass:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: windlass-test
    ports:
      - "5010:5010"
    depends_on:
      mock-gluetun:
        condition: service_healthy
      mock-qbittorrent:
        condition: service_healthy
      mock-gotify:
        condition: service_healthy
      mock-mam:
        condition: service_healthy
      chaos-controller:
        condition: service_healthy
    volumes:
      - vpn-files:/tmp/gluetun:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      QBITTORRENT_URL:  http://mock-qbittorrent:8080
      QBITTORRENT_USER: admin
      QBITTORRENT_PASS: adminadmin
      MAM_SESSION:      test_session
      GOTIFY_URL:       http://mock-gotify:8080
      GOTIFY_TOKEN:     test_token
      MAM_SEEDBOX_URL:  http://mock-mam:8080/json/dynamicSeedbox.php
      MAM_LOAD_URL:     "http://mock-mam:8080/jsonLoad.php?snatch_summary=true&clientStats"
      DATA_PATH:        /tmp
      DUMP_DIR:         /tmp/windlass_dumps
      VPN_IP_FILE:      /tmp/gluetun/ip
      VPN_PORT_FILE:    /tmp/gluetun/forwarded_port
      WINDLASS_BIND:    0.0.0.0:5010
      CHAOS_URL:        http://localhost:9000
      RUST_LOG:         windlass=debug,info

volumes:
  vpn-files:
